<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login & sign in</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="form-box">
        <h1 id="header">Sign Up</h1>
        <form>
          <div class="input-field" id="inputName">
            <input type="text" placeholder="Name" required />
          </div>
          <div class="input-field">
            <input type="Email" placeholder="Email" required />
          </div>
          <div class="input-field">
            <input type="password" placeholder="Password" required />
          </div>
          <div class="p">
            <p class="ptag">Forgotten password <a href="#">click here</a></p>
          </div>
          <div class="btn-field">
            <button type="signupBtn" id="signupBtn">Sign Up</button>
            <button type="signinBtn" id="signinBtn" class="disable">
              Sign In
            </button>
          </div>
        </form>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
